name: Flutter Mobile

on:
  push:
    paths:
      - "mobile/flutter_app/**"
      - ".github/workflows/flutter-mobile.yml"
  pull_request:
    paths:
      - "mobile/flutter_app/**"
      - ".github/workflows/flutter-mobile.yml"

jobs:
  flutter-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile/flutter_app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test
