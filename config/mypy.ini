[mypy]
python_version = 3.14
warn_return_any = False
warn_unused_configs = True
ignore_missing_imports = True
follow_imports = silent
check_untyped_defs = False
no_implicit_optional = True
pretty = True
show_error_codes = True

[mypy-repository.repository_trip_user]
disable_error_code = attr-defined

[mypy-repository.repository_location]
disable_error_code = attr-defined

[mypy-repository.repository_finds]
disable_error_code = attr-defined

[mypy-repository.repository_geology_schema]
disable_error_code = attr-defined

[mypy-repository.repository_geology_data]
disable_error_code = attr-defined

[mypy-ui.trip_dialog_controller]
disable_error_code = arg-type
