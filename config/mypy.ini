[mypy]
python_version = 3.14
warn_return_any = False
warn_unused_configs = True
ignore_missing_imports = True
follow_imports = silent
check_untyped_defs = False
no_implicit_optional = True
pretty = True
show_error_codes = True

[mypy-repository.repository_trip_user]
disable_error_code = attr-defined

[mypy-repository.repository_location]
disable_error_code = attr-defined

[mypy-repository.repository_finds]
disable_error_code = attr-defined

[mypy-repository.repository_geology_schema]
disable_error_code = attr-defined

[mypy-repository.repository_geology_data]
disable_error_code = attr-defined

[mypy-ui.trip_dialog_controller]
disable_error_code = arg-type

[mypy-ui.planning_phase_window_selection]
disable_error_code = attr-defined

[mypy-ui.planning_phase_window_palette]
disable_error_code = attr-defined,arg-type

[mypy-ui.trip_form_dialog_pickers]
disable_error_code = attr-defined,arg-type

[mypy-ui.trip_form_dialog]
disable_error_code = assignment,call-overload,attr-defined,call-arg

[mypy-repository.postgres_trip_repository_domain]
disable_error_code = attr-defined,typeddict-item

[mypy-ui.team_editor_dialog]
disable_error_code = call-overload

[mypy-ui.location_picker_dialog]
disable_error_code = call-overload

[mypy-ui.team_member_form_dialog]
disable_error_code = call-overload

[mypy-ui.location_form_dialog]
disable_error_code = call-overload

[mypy-ui.geology_form_dialog]
disable_error_code = attr-defined,call-overload

[mypy-ui.find_form_dialog]
disable_error_code = assignment,call-overload,attr-defined,call-arg

[mypy-ui.auto_hide_scrollbars]
disable_error_code = override

[mypy-ui.team_members_tab]
disable_error_code = operator,arg-type

[mypy-ui.location_tab]
disable_error_code = arg-type,typeddict-unknown-key,call-overload

[mypy-ui.geology_tab]
disable_error_code = arg-type,assignment
