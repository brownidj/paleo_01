services:
  postgres:
    image: postgres:15-alpine
    container_name: paleo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-paleo}
      POSTGRES_USER: ${POSTGRES_USER:-paleo}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    secrets:
      - postgres_password
    security_opt:
      - no-new-privileges:true
    networks:
      - backend

  api:
    build:
      context: ../../backend
    container_name: paleo_api
    restart: unless-stopped
    env_file:
      - ${PALEO_ENV_FILE:-../../config/env/local.env}
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-local}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s
    security_opt:
      - no-new-privileges:true
    networks:
      - backend

  caddy:
    image: caddy:2.8-alpine
    container_name: paleo_caddy
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      SERVER_HOST: ${SERVER_HOST:-localhost}
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    volumes:
      - ../caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    security_opt:
      - no-new-privileges:true
    networks:
      - backend
      - edge

secrets:
  postgres_password:
    file: ../../secrets/postgres_password.txt

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  backend:
  edge:
